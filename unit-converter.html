<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter - ToolNest</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<header>
    <h1>ToolNest</h1>

    <nav>
        <a href="../index.html">Home</a>
        <a href="calculator.html">Calculator</a>
        <a href="unit-converter.html">Unit Converter</a>
    </nav>
</header>

<section class="calculator">
    <h2>Unit Converter</h2>

    <label for="value">Value</label>
    <input type="number" id="value" placeholder="Enter a value">

    <label for="conversion">Conversion</label>

    <select id="conversion">
        <option value="kmToMiles">Kilometers to Miles</option>
        <option value="milesToKm">Miles to Kilometers</option>
    </select>

    <button id="convertBtn">Convert</button>

    <h3 id="conversionResult">Result:</h3>
</section>

<script src="../script.js"></script>
